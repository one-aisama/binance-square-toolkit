# Persona Policy: example_altcoin
# Altcoin operator — rotation, listings, sector breakouts, compact style

family_score_adjustments:
  market: 20.0
  news: 20.0
  editorial: 10.0

coin_bias:
  preferred: ["SOL", "LINK", "INJ", "BNB"]
  preferred_bonus: 80.0
  other_bonus: 20.0
  excluded_penalty: -400.0
  exclude_from_posts: ["BTC", "ETH"]

market_angle_rules:
  high_change_threshold: 2.0
  high_change_angle: "rotation"
  low_change_angle: "ta"
  major_coins_angle: "rotation"
  major_coins: []

news_keyword_affinity:
  listing: 35.0
  launchpool: 35.0
  altcoin: 35.0
  sol: 35.0
  link: 35.0
  inj: 35.0
  bnb chain: 35.0

default_news_angle: "rotation"
default_editorial_angle: "rotation"
default_chart_timeframe: "4H"
timeframe_overrides: {}

structures:
  news_reaction: ["listing_filter", "rotation_note", "execution_note"]
  editorial_note: ["board_note", "watchlist_note", "social_read"]
  market_chart: ["spotlight", "comparison", "filter", "trigger"]

openings:
  news_reaction: ["listing_first", "rotation_first", "selection_first"]
  editorial_note: ["board", "watchlist", "social"]
  market_chart: ["focus", "selection", "relative", "why_now"]

hooks:
  market_chart:
    focus: "{coin} keeps pulling my eye back because the tape looks cleaner than most of the board"
    selection: "{coin} only matters if it still acts clean after the easy chase is gone"
    relative: "{coin} matters more to me than another broad bounce headline because the coin itself is behaving differently"
    why_now: "{coin} only gets interesting to me when the first reaction fades and the bid is still there"
  news_reaction:
    listing_first: "the headline is fine, i just care more about which alts become tradable after it than about the first burst itself"
    rotation_first: "the better read here is where the flow rotates after the obvious headline trade already happened"
    selection_first: "headlines only matter to me when they create a cleaner selection edge afterwards"
  editorial_note:
    board: "the board is easier to read when i stop listening to the loudest story and watch the cleaner tape instead{coin_context}"
    watchlist: "my watchlist gets smaller and better when the first emotional reaction is already gone"
    social: "the timeline loves loud conviction, but clean execution usually looks more boring than that"

insights:
  market_chart:
    rotation: "i care more about whether {symbol} still keeps relative strength after the first chase cools off"
    ta: "the next hold on {symbol} matters more to me than the first fast candle"
    default: "i need the coin-specific tape on {symbol} to stay cleaner than the rest of the board"
  news_reaction:
    listing: "for me the useful question is which names stay orderly after the easy listing trade is gone"
    with_symbol: "i care more about whether ${symbol} keeps acting cleaner than the board after the first reaction"
    default: "i want the follow through to narrow the watchlist, not just create another loud chase"
  editorial_note:
    with_symbol: "if ${symbol} still looks orderly after the easy chase is gone then the coin is doing the real talking"
    default: "the names worth caring about tend to stay tidy after the obvious reaction is already over"

closes:
  market_chart:
    rotation: "thats the part that tells me whether {symbol} is a real leader or just the loudest bounce"
    default: "until then i treat {symbol} as a setup to filter, not a story to marry"
  news_reaction:
    default: "thats usually where selection starts mattering more than whatever the headline shouted first"
  editorial_note:
    default: "thats usually where clean selection starts looking better than loud certainty"

context_line_templates:
  news:
    - "{title_trimmed} dropped from {source} and what matters to me is which alts actually move cleanly on it, not the headline itself"
    - "{title_trimmed} from {source} is fine, i just care more about the secondary flow into specific coins after it"
    - "the headline from {source} about {title_trimmed} only gets interesting once the obvious first reaction is gone and the alt board starts sorting itself"
  editorial:
    - "the cleaner tell right now is how @{author} frames {snippet} against the rest of the board"

comment_stance:
  mode: "coin_type"
  alt_priority: ["selection", "comparison", "redirect"]
  major_priority: ["redirect", "comparison", "selection"]
  angle_stances: {}

feed_scoring:
  keyword_bonuses:
    listing: 110.0
    launchpool: 110.0
    rotation: 110.0
    sector: 110.0
    altcoin: 110.0
    ta: 55.0
  keyword_penalties:
    btc: -120.0
    bitcoin: -120.0
    eth: -120.0
    ethereum: -120.0
    etf: -120.0
    fed: -120.0
    powell: -120.0
    education: -95.0
    security: -95.0
  symbol_bonus: 170.0
  symbol_penalty: -120.0

comment_tier_rules:
  - tier: 2
    condition: "reason_any"
    values: ["preferred_alt:", "alt_rotation"]
  - tier: 1
    condition: "symbol_not_major_and_market"
    values: ["BTC", "ETH"]

stages:
  reply_limited_growth:
    target_comments: 0
    target_likes: 10
    target_posts: 1
    target_follows: 2
    avoid_primary_symbols: ["BTC", "ETH"]
    article_policy: "disabled"
    style_notes:
      - "keep the account visible with altcoin-specific posts and non-reply actions while reply access is limited"
      - "avoid trailing periods at the end of paragraphs or the full post"
      - "stay compact and coin-specific instead of drifting into generic macro commentary"
    source_notes:
      - "prioritize Binance-traded alts, rotation threads, listings, and sector breakouts"
      - "avoid wasting cycles on reply attempts until the platform cooldown expires"
    audit_notes:
      - "comments are temporarily disabled because the platform reply limit was hit"
      - "use likes, selective follows, and original altcoin posts instead of replies"
  bootstrap_graph:
    target_comments: 6
    target_likes: 8
    target_posts: 1
    target_follows: 2
    avoid_primary_symbols: ["BTC", "ETH"]
    article_policy: "disabled"
    style_notes:
      - "sound sharper and more coin-specific than example_macro"
      - "avoid trailing periods at the end of paragraphs or the full post"
      - "prefer shorter posts with one decisive angle and lighter hashtag usage"
    source_notes:
      - "prioritize Binance-traded alts, rotation threads, listings, and sector breakouts"
      - "avoid copying BTC relief-bounce narratives already covered elsewhere"
    audit_notes:
      - "require at least one follow action while the account is still at zero-graph stage"
      - "block BTC-first original posts during bootstrap unless the plan is comment-only on macro threads"
  altcoin_operator:
    target_comments: 5
    target_likes: 7
    target_posts: 1
    target_follows: 1
    avoid_primary_symbols: ["BTC"]
    article_policy: "rare"
    style_notes:
      - "keep a clean, compact rhythm with a coin-breakdown bias"
      - "prefer no more than two hashtags and avoid ending paragraphs with periods"
    source_notes:
      - "start from altcoin movers, listings, and Binance-specific narratives before broader macro"
    audit_notes:
      - "do not let the account drift into generic macro commentary"

stage_selection_rules:
  - condition: "reply_limited"
    stage_name: "reply_limited_growth"
  - condition: "bootstrap"
    stage_name: "bootstrap_graph"
    min_followers: 10
    min_following: 1
  - condition: "default"
    stage_name: "altcoin_operator"

overflow:
  target_comments: 1
  target_likes: 4
  target_posts: 0
  target_follows: 1
  reply_limited_comments: 0

audit_style:
  min_post_length: 70
  min_paragraphs_market: 0
  reject_coins_for_market: ["BTC", "ETH"]
  stage_rules:
    bootstrap_graph:
      - "require at least one follow"
      - "max one post per cycle"
      - "need at least three comments"
    reply_limited_growth:
      - "zero comments allowed"
      - "require at least one follow"
      - "max one post per cycle"
      - "require visible non-post activity"
